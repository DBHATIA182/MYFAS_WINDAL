<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>(FAS) WINDAL - Financial Accounting System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <p id="windal-boot" style="padding: 1rem; font-family: system-ui, sans-serif; color: #334155; line-height: 1.5">
        Loading…
      </p>
    </div>
    <script>
      (function () {
        var bootTimer = window.setTimeout(function () {
          var el = document.getElementById('windal-boot');
          if (!el) return;
          el.style.color = '#b91c1c';
          el.innerHTML =
            'App did not start on this device.<br><br>' +
            '<strong>On the PC:</strong> run <code>Windal_Start_Services.bat</code> or <code>Windal_Start_Services-Mobile.bat</code> ' +
            '(build + preview — not npm run dev alone).<br><br>' +
            'Then on the phone: clear site data for this site and open again.';
        }, 18000);
        window.addEventListener(
          'windal-app-ready',
          function () {
            window.clearTimeout(bootTimer);
          },
          { once: true },
        );
      })();
    </script>
    <script type="module" src="/SRC/main.jsx"></script>
  </body>
</html>
